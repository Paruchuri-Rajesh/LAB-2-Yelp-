apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-api
  namespace: yelp
spec:
  replicas: 1
  selector:
    matchLabels: { app: user-api }
  template:
    metadata:
      labels: { app: user-api }
    spec:
      containers:
        - name: user-api
          image: yelp/user-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: yelp-config }
            - secretRef: { name: yelp-secrets }
          env:
            - { name: SERVICE_NAME, value: user-api }
          readinessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: user-api
  namespace: yelp
spec:
  selector: { app: user-api }
  ports:
    - port: 8000
      targetPort: 8000
---
