apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: yelp
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: yelp/frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: yelp
spec:
  selector: { app: frontend }
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
