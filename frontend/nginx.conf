server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Review routes live under /restaurants/{id}/reviews — regex beats plain
    # prefix so review-api claims them ahead of restaurant-api.
    location ~ ^/api/v1/restaurants/[^/]+/reviews {
        proxy_pass http://review-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/ai-assistant/ {
        proxy_pass http://ai-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }
    location /api/v1/auth/ {
        proxy_pass http://user-api:8000;
    }
    location /api/v1/users/ {
        proxy_pass http://user-api:8000;
    }
    location /api/v1/owner/ {
        proxy_pass http://owner-api:8000;
    }
    location /api/v1/restaurants {
        proxy_pass http://restaurant-api:8000;
    }
    location /uploads/ {
        proxy_pass http://restaurant-api:8000;
    }
}
